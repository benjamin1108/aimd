name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            artifact_glob: "target/release/bundle/dmg/*.dmg"
          - name: Windows x64
            os: windows-latest
            artifact_glob: "target/release/bundle/nsis/*.exe target/release/bundle/msi/*.msi"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Frontend checks
        working-directory: apps/desktop
        run: npm run check

      - name: Build desktop app
        working-directory: apps/desktop
        run: npm run build

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "AIMD Desktop $RELEASE_TAG"
          shopt -s nullglob
          files=( ${{ matrix.artifact_glob }} )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found for pattern: ${{ matrix.artifact_glob }}" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
