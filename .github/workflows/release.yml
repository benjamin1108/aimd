name: Release Desktop
run-name: Release ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            upload_globs: |
              dist/AIMD-*.pkg
              dist/AIMD-*.pkg.sig
          - name: Windows x64
            os: windows-latest
            upload_globs: |
              dist/AIMD-Desktop_*_windows_x64-setup.exe
              dist/AIMD-Desktop_*_windows_x64-setup.exe.sig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute cache inputs
        id: cache-inputs
        run: node scripts/gha-cache-inputs.mjs

      - name: Cache scope diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "github.ref=${GITHUB_REF}"
          echo "github.ref_name=${GITHUB_REF_NAME}"
          echo "release_tag=${{ inputs.tag }}"
          echo "npm_lock_hash=${{ steps.cache-inputs.outputs.npm_lock_hash }}"
          echo "rust_cache_hash=${{ steps.cache-inputs.outputs.rust_cache_hash }}"
          echo "desktop_tools_hash=${{ steps.cache-inputs.outputs.desktop_tools_hash }}"

      - name: Locate npm cache
        id: npm-cache
        shell: bash
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: NPM cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: npm-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-inputs.outputs.npm_lock_hash }}
          restore-keys: |
            npm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-release-rust
          shared-key: ${{ steps.cache-inputs.outputs.rust_cache_hash }}
          add-rust-environment-hash-key: "false"
          cache-on-failure: false
          cache-bin: false

      - name: Rust toolchain check
        shell: bash
        run: |
          set -euo pipefail
          echo "cargo: $(command -v cargo)"
          echo "rustc: $(command -v rustc)"
          cargo --version
          rustc --version
          cargo metadata --locked --no-deps --format-version 1 >/dev/null

      - name: Rust cache target diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "target_dir=${PWD}/target"
          if [ ! -d target ]; then
            echo "target_status=missing"
            exit 0
          fi
          du -sh target || true
          if [ ! -d target/release ]; then
            echo "target_release_status=missing"
            exit 0
          fi
          du -sh target/release || true
          echo "release_deps_rlib_count=$(find target/release/deps -maxdepth 1 -type f -name '*.rlib' 2>/dev/null | wc -l | tr -d ' ')"
          echo "release_deps_rmeta_count=$(find target/release/deps -maxdepth 1 -type f -name '*.rmeta' 2>/dev/null | wc -l | tr -d ' ')"
          find target/release -maxdepth 2 -type f \( -name 'aimd*' -o -name '*.rlib' -o -name '*.rmeta' \) -print 2>/dev/null \
            | sort \
            | head -n 40

      - name: Windows build tool cache
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri
            ~\AppData\Local\ms-playwright
          key: windows-build-tools-${{ runner.arch }}-${{ steps.cache-inputs.outputs.desktop_tools_hash }}
          restore-keys: |
            windows-build-tools-${{ runner.arch }}-

      - name: macOS build tool cache
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/tauri
            ~/Library/Caches/ms-playwright
          key: macos-build-tools-${{ runner.arch }}-${{ steps.cache-inputs.outputs.desktop_tools_hash }}
          restore-keys: |
            macos-build-tools-${{ runner.arch }}-

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci --prefer-offline

      - name: Version check
        env:
          CI_RELEASE: "1"
          RELEASE_TAG: ${{ inputs.tag }}
        run: npm run version:check -- --verify-tag

      - name: Updater signing secret check
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run updater:check-secrets -- --require

      - name: Frontend checks
        if: runner.os != 'Windows'
        working-directory: apps/desktop
        run: npm run check

      - name: Build macOS PKG and updater artifact
        if: runner.os != 'Windows'
        env:
          AIMD_RELEASE: "1"
          AIMD_UPDATER_ARTIFACTS: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./scripts/build-macos-pkg.sh --skip-env

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AIMD_RELEASE: "1"
          AIMD_UPDATER_ARTIFACTS: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          .\scripts\build-windows-installer.ps1 -SkipEnv -SkipNpmInstall
          target\release\aimd.exe version
          target\release\aimd.exe set-title --help
          target\release\aimd.exe skill doctor --json

      - name: Rust build output diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "target_dir=${PWD}/target"
          if [ ! -d target ]; then
            echo "target_status=missing"
            exit 0
          fi
          du -sh target || true
          if [ ! -d target/release ]; then
            echo "target_release_status=missing"
            exit 0
          fi
          du -sh target/release || true
          echo "release_deps_rlib_count=$(find target/release/deps -maxdepth 1 -type f -name '*.rlib' 2>/dev/null | wc -l | tr -d ' ')"
          echo "release_deps_rmeta_count=$(find target/release/deps -maxdepth 1 -type f -name '*.rmeta' 2>/dev/null | wc -l | tr -d ' ')"
          find target/release -maxdepth 2 -type f \( -name 'aimd*' -o -name '*.rlib' -o -name '*.rmeta' \) -print 2>/dev/null \
            | sort \
            | head -n 40

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "AIMD Desktop $RELEASE_TAG"
          shopt -s nullglob
          files=()
          while IFS= read -r pattern; do
            pattern="${pattern#"${pattern%%[![:space:]]*}"}"
            pattern="${pattern%"${pattern##*[![:space:]]}"}"
            [ -n "$pattern" ] || continue
            matches=( $pattern )
            if [ "${#matches[@]}" -eq 0 ]; then
              echo "No release assets found for pattern: $pattern" >&2
              exit 1
            fi
            files+=( "${matches[@]}" )
          done <<'GLOBS'
          ${{ matrix.upload_globs }}
          GLOBS
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found for configured upload globs" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

  manifest:
    name: Generate updater manifest
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Version check
        env:
          CI_RELEASE: "1"
          RELEASE_TAG: ${{ inputs.tag }}
        run: npm run version:check -- --verify-tag

      - name: Download uploaded release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$RELEASE_TAG" --dir dist --clobber --pattern "AIMD*"
          find dist -maxdepth 1 -type f -print | sort

      - name: Generate and validate latest.json
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          node scripts/updater-manifest.mjs generate --dist dist --tag "$RELEASE_TAG" --output dist/latest.json
          node scripts/updater-manifest.mjs validate --dist dist --tag "$RELEASE_TAG" --manifest dist/latest.json --require-files

      - name: Upload and verify updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/latest.json --clobber
          node scripts/updater-manifest.mjs verify-release --tag "$RELEASE_TAG" --manifest dist/latest.json
