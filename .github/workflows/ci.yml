name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  version:
    name: Version Automation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Version check
        run: npm run version:check

      - name: Version tests
        run: npm run test:version

      - name: Updater manifest tests
        run: npm run test:updater

      - name: Updater release plan
        run: npm run updater:plan

      - name: Release dry-run patch
        run: npm run release:dry -- patch

      - name: Release dry-run minor
        run: npm run release:dry -- minor

      - name: Release dry-run major
        run: npm run release:dry -- major

      - name: Release dry-run republish
        run: npm run release:dry -- republish

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute cache inputs
        id: cache-inputs
        run: node scripts/gha-cache-inputs.mjs

      - name: Locate npm cache
        id: npm-cache
        shell: bash
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: NPM cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: npm-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-inputs.outputs.npm_lock_hash }}
          restore-keys: |
            npm-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: ${{ steps.cache-inputs.outputs.rust_cache_hash }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci --prefer-offline

      - name: Warning-free checks
        run: npm run check

      - name: Rust crate tests
        run: cargo test -p aimd-core -p aimd-mdx -p aimd-render
