name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  version:
    name: Version Automation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Version check
        run: npm run version:check

      - name: Version tests
        run: npm run test:version

      - name: Release dry-run patch
        run: npm run release:dry -- patch

      - name: Release dry-run minor
        run: npm run release:dry -- minor

      - name: Release dry-run major
        run: npm run release:dry -- major

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Version check
        run: npm run version:check

      - name: Frontend checks
        working-directory: apps/desktop
        run: npm run check

      - name: Rust crate tests
        run: cargo test -p aimd-core -p aimd-mdx -p aimd-render
